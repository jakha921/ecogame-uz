services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecogame}
      POSTGRES_USER: ${POSTGRES_USER:-ecogame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecogame}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    volumes:
      - static_volume:/app/static_collected
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - default
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ecogame.rule=Host(`ecogame.fullfocus.dev`)"
      - "traefik.http.routers.ecogame.entrypoints=http,https"
      - "traefik.http.routers.ecogame.tls=true"
      - "traefik.http.routers.ecogame.tls.certresolver=letsencrypt"
      - "traefik.http.services.ecogame.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

networks:
  coolify:
    external: true

volumes:
  postgres_data:
  static_volume:
  media_volume:
